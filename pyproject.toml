[project]
name = "edge-vlm"
version = "0.1.0"
description = "SmolVLM training, profiling, and deployment scaffold for CNN-accelerated microcontrollers."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "datasets>=2.20",
    "hydra-core>=1.3",
    "lightning>=2.4",
    "omegaconf>=2.3",
    "pillow>=10.4",
    "python-dotenv>=1.0",
    "torch>=2.4",
    "torchvision>=0.19",
    "tqdm>=4.66",
    "transformers>=4.45",
    "wandb>=0.17",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "ruff>=0.6",
]

[project.scripts]
edge-vlm = "cli:main"

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src", "conf"]
sources = ["src"]
