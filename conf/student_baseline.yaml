seed: 42

paths:
  dataset_root: data/the_cauldron_yes_no_vsr_token1000_img512_parquet
  teacher_cache: artifacts/teacher_cache/smolvlm_yes_no_vsr_token1000_img512.jsonl
  compact_embeddings: artifacts/models/smolvlm_yes_no_vsr_compact_embeddings.pt
  report_dir: artifacts/reports/student_baseline
  checkpoint_dir: artifacts/models/student_baseline
  wandb_env_file: ../wandb_api_key.env

teacher:
  model_name: HuggingFaceTB/SmolVLM-256M-Instruct
  local_files_only: false
  trust_remote_code: true

model:
  freeze_embeddings: true
  image_pretrained: true
  image_size: 224
  query_dim: 128
  image_dim: 128
  fusion_dim: 128
  fusion_depth: 2
  fusion_heads: 4
  fusion_mlp_ratio: 2
  dropout: 0.1

distillation:
  alpha: 0.5
  kind: mse_logit
  temperature: 1.0

data:
  batch_size: 256
  num_workers: 16
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  row_group_cache_size: 1
  tensor_cache_size: 256
  group_train_by_image: true
  shuffle_block_size: 256
  # filter: compare every alpha on the cache-covered subset.
  # keep: retain all rows; valid only for hard-label-only alpha=1 runs.
  missing_teacher_policy: filter

optimizer:
  learning_rate: 0.0003
  warmup_start_learning_rate: 0.00003
  warmup_steps: 1000
  weight_decay: 0.01

trainer:
  accelerator: auto
  devices: 1
  precision: 16-mixed
  max_epochs: 10
  log_every_n_steps: 25

wandb:
  project: vlm-micro
  entity: null
  mode: online
  tags: [student, baseline, mobilenet-v3-small, distillation]

experiment:
  run_name: student-baseline-alpha-${distillation.alpha}
